<!DOCTYPE html>
<html lang="zh" id="html-root">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>摇摇赛马</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #222; font-family: sans-serif; touch-action: none; position: fixed; width: 100%; height: 100%; }
    canvas { display: block; touch-action: none; }

    /* ── 主界面 ── */
    #main-menu {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #2a4a1a 0%, #3d6b24 40%, #2a4a1a 100%);
      z-index: 200;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      color: #fff;
    }
    #main-menu.hidden { display: none; }

    #main-menu .game-title {
      font-size: 4rem; font-weight: 900;
      color: #ffdd44;
      text-shadow: 0 4px 20px rgba(255,220,60,0.4), 0 2px 0 #aa8800;
      letter-spacing: 0.1em;
      margin-bottom: 20px;
    }
    #main-menu .game-intro {
      font-size: 1.1rem; color: rgba(255,255,255,0.8);
      max-width: 400px; text-align: center;
      line-height: 1.8; margin-bottom: 40px;
    }
    #main-menu .menu-btn {
      padding: 16px 48px;
      font-size: 1.3rem; font-weight: bold;
      color: #fff;
      background: linear-gradient(135deg, #ff6633, #ff3366);
      border: none; border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(255,50,80,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    #main-menu .menu-btn:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 6px 25px rgba(255,50,80,0.6);
    }
    #main-menu .menu-btn:active {
      transform: translateY(0) scale(0.98);
    }
    #main-menu .race-btn {
      background: linear-gradient(135deg, #33aa66, #2288aa);
      box-shadow: 0 4px 15px rgba(50,150,100,0.4);
    }
    #main-menu .race-btn:hover {
      box-shadow: 0 6px 25px rgba(50,150,100,0.6);
    }
    #main-menu .menu-note {
      margin-top: 20px;
      font-size: 0.85rem; color: rgba(255,255,255,0.5);
      max-width: 350px; text-align: center;
      line-height: 1.6;
    }
    #main-menu .horse-emoji {
      font-size: 3rem; margin-bottom: 10px;
    }

    /* ── 游戏UI ── */
    #info {
      position: fixed; top: 10px; left: 10px;
      color: #fff; font: 14px monospace;
      background: rgba(0,0,0,0.5); padding: 8px 12px;
      border-radius: 6px; pointer-events: none; z-index: 10;
    }

    #rankings {
      position: fixed; top: 44px; right: 10px;
      color: #fff; font: 14px monospace;
      background: rgba(0,0,0,0.6); padding: 10px 14px;
      border-radius: 6px; pointer-events: none; z-index: 10;
      line-height: 1.6;
    }

    #horse-stats {
      position: fixed; top: 80px; right: 10px;
      color: #fff; font: 12px sans-serif;
      background: rgba(0,0,0,0.7); padding: 12px 14px;
      border-radius: 8px; z-index: 10;
      max-height: 75vh; overflow-y: auto;
      width: 220px;
      backdrop-filter: blur(4px);
    }
    #horse-stats .section { margin-bottom: 8px; }
    #horse-stats .section-title {
      font-size: 10px; color: #aaa; text-transform: uppercase;
      letter-spacing: 1px; margin-bottom: 4px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 2px;
    }
    #horse-stats .stat-row {
      display: flex; align-items: center; justify-content: space-between;
      margin: 3px 0; font-size: 11px;
    }
    #horse-stats .stat-label { color: #ccc; flex-shrink: 0; }
    #horse-stats .stat-value { color: #fff; font-weight: bold; text-align: right; }
    #horse-stats .bar-wrap {
      flex: 1; height: 6px; background: rgba(255,255,255,0.1);
      border-radius: 3px; margin: 0 6px; overflow: hidden;
    }
    #horse-stats .bar-fill {
      height: 100%; border-radius: 3px;
      transition: width 0.2s;
    }
    #horse-stats .tag {
      display: inline-block; padding: 1px 6px;
      border-radius: 3px; font-size: 10px; font-weight: bold;
    }
    #horse-stats .tag-on { background: #4a4; color: #fff; }
    #horse-stats .tag-off { background: #555; color: #888; }
    #horse-stats .tag-val { background: #446; color: #aaf; }
    #horse-stats .horse-name {
      font-size: 14px; font-weight: bold; margin-bottom: 6px;
    }
    #horse-stats .save-btn {
      display: block; width: 100%; margin-top: 8px;
      padding: 6px 0; text-align: center;
      background: linear-gradient(135deg, #ffdd44, #ffaa22);
      color: #333; border: none; border-radius: 6px;
      font: bold 12px sans-serif;
      cursor: pointer; pointer-events: auto;
    }
    #horse-stats .save-btn:hover { filter: brightness(1.1); }
    #horse-stats .saved-count {
      display: block; text-align: center;
      color: #888; font-size: 10px; margin-top: 4px; margin-bottom: 4px;
    }

    #debug-canvas {
      position: fixed; bottom: 10px; left: 10px;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 4px;
      background: rgba(0,0,0,0.7);
      z-index: 10;
    }

    #stamina-bar {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 8px;
      color: #fff; font: bold 13px sans-serif;
      pointer-events: none; z-index: 10;
    }
    #stamina-bar-bg {
      width: 300px; height: 16px;
      background: rgba(0,0,0,0.5); border-radius: 8px; overflow: hidden;
    }
    #stamina-bar-fill {
      width: 0%; height: 100%;
      background: linear-gradient(90deg, #4466ff, #aa44ff, #ff44aa);
      border-radius: 8px;
      transition: width 0.05s linear;
    }
    #swipe-indicator {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 5;
    }

    #finish-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      justify-content: center; align-items: center;
      flex-direction: column;
    }
    #finish-overlay.active { display: flex; }
    #finish-overlay .title {
      font-size: 5rem; font-weight: bold;
      color: #ffdd44;
      text-shadow: 0 0 20px rgba(255,220,60,0.5);
      animation: pulse 0.6s ease-in-out infinite alternate;
    }
    #finish-overlay .rank {
      font-size: 2rem; color: #fff; margin-top: 10px;
    }
    .finish-choices {
      display: flex; gap: 20px; margin-top: 30px;
    }
    .finish-btn {
      display: flex; flex-direction: column; align-items: center;
      padding: 20px 30px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 14px;
      background: rgba(0,0,0,0.4);
      color: #fff; cursor: pointer;
      transition: transform 0.15s, background 0.15s, border-color 0.15s;
      pointer-events: auto;
      backdrop-filter: blur(4px);
    }
    .finish-btn:hover {
      transform: translateY(-3px) scale(1.03);
      border-color: rgba(255,255,255,0.6);
      background: rgba(0,0,0,0.6);
    }
    .finish-btn:active { transform: translateY(0) scale(0.97); }
    .finish-btn .btn-icon { font-size: 2.5rem; margin-bottom: 8px; }
    .finish-btn .btn-label { font-size: 1.2rem; font-weight: bold; }
    .finish-btn .btn-desc { font-size: 0.8rem; color: #aaa; margin-top: 4px; }
    .keep-btn:hover { border-color: #ffdd44; }
    .release-btn:hover { border-color: #66cc66; }
    @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.08); } }

    /* ── 联机大厅界面 ── */
    #online-lobby {
      display: none;
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #1a1a3a 0%, #2a2a5a 50%, #1a1a3a 100%);
      z-index: 200;
      flex-direction: column;
      align-items: center;
      padding-top: 40px;
      color: #fff;
    }
    #online-lobby.active { display: flex; }
    #online-lobby .lobby-title {
      font-size: 2.2rem; font-weight: 900;
      color: #88aaff;
      text-shadow: 0 2px 10px rgba(100,150,255,0.3);
      margin-bottom: 24px;
    }
    #online-lobby .lobby-actions {
      display: flex; gap: 12px; margin-bottom: 20px;
    }
    #online-lobby .lobby-btn {
      padding: 10px 28px;
      font-size: 1rem; font-weight: bold;
      color: #fff; border: none; border-radius: 10px;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s;
    }
    #online-lobby .lobby-btn:hover { transform: translateY(-2px); }
    #online-lobby .lobby-btn:active { transform: translateY(0) scale(0.97); }
    .btn-create-room {
      background: linear-gradient(135deg, #6633ff, #3366ff);
      box-shadow: 0 3px 12px rgba(50,80,255,0.4);
    }
    .btn-refresh-rooms {
      background: linear-gradient(135deg, #33aa66, #2288aa);
      box-shadow: 0 3px 12px rgba(50,150,100,0.4);
    }
    .btn-back-lobby {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3) !important;
    }
    #room-list-container {
      width: 90%; max-width: 500px;
      flex: 1;
      overflow-y: auto;
    }
    #room-list-container .room-empty {
      text-align: center; color: rgba(255,255,255,0.4);
      font-size: 1rem; margin-top: 40px;
    }
    .room-card {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 18px;
      margin-bottom: 10px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      transition: background 0.15s, border-color 0.15s;
    }
    .room-card:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(100,150,255,0.4);
    }
    .room-card .room-info { display: flex; flex-direction: column; gap: 4px; }
    .room-card .room-name { font-size: 1.05rem; font-weight: bold; }
    .room-card .room-players { font-size: 0.85rem; color: rgba(255,255,255,0.6); }
    .room-card .btn-join {
      padding: 8px 20px;
      font-size: 0.9rem; font-weight: bold;
      color: #fff;
      background: linear-gradient(135deg, #33aa66, #2288aa);
      border: none; border-radius: 8px;
      cursor: pointer;
      transition: transform 0.12s;
    }
    .room-card .btn-join:hover { transform: scale(1.05); }

    /* ── 房间等待界面 ── */
    #room-wait {
      display: none;
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #1a2a1a 0%, #2a4a2a 50%, #1a2a1a 100%);
      z-index: 200;
      flex-direction: column;
      align-items: center;
      padding-top: 40px;
      color: #fff;
    }
    #room-wait.active { display: flex; }
    #room-wait .wait-title {
      font-size: 2rem; font-weight: 900;
      color: #88ff88;
      text-shadow: 0 2px 10px rgba(100,255,100,0.3);
      margin-bottom: 8px;
    }
    #room-wait .wait-phase {
      font-size: 1rem; color: rgba(255,255,255,0.5);
      margin-bottom: 20px;
    }
    #player-list {
      width: 80%; max-width: 400px;
      margin-bottom: 24px;
    }
    .player-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 16px;
      margin-bottom: 6px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
    }
    .player-row .player-name { font-weight: bold; }
    .player-row .player-tag {
      font-size: 0.8rem; padding: 2px 8px; border-radius: 4px;
    }
    .player-row .tag-host { background: #ffdd44; color: #333; }
    .player-row .tag-ready { background: #44cc44; color: #fff; }
    .player-row .tag-not-ready { background: #666; color: #aaa; }
    .player-row .tag-you { background: rgba(100,150,255,0.3); color: #aaf; margin-left: 6px; }
    #room-wait .wait-actions {
      display: flex; gap: 12px;
    }
    #room-wait .wait-btn {
      padding: 12px 36px;
      font-size: 1.1rem; font-weight: bold;
      color: #fff; border: none; border-radius: 10px;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s;
    }
    #room-wait .wait-btn:hover { transform: translateY(-2px); }
    #room-wait .wait-btn:active { transform: translateY(0) scale(0.97); }
    .btn-ready {
      background: linear-gradient(135deg, #33aa66, #228855);
      box-shadow: 0 3px 12px rgba(50,170,100,0.4);
    }
    .btn-ready.is-ready {
      background: linear-gradient(135deg, #aa6633, #885522);
      box-shadow: 0 3px 12px rgba(170,100,50,0.4);
    }
    .btn-start-game {
      background: linear-gradient(135deg, #ff6633, #ff3366);
      box-shadow: 0 3px 12px rgba(255,50,80,0.4);
    }
    .btn-start-game:disabled {
      opacity: 0.4; cursor: not-allowed;
      transform: none !important;
    }
    .btn-leave-room {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3) !important;
    }

    /* ── 网络请求遮罩 ── */
    #loading-mask {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 300;
      justify-content: center; align-items: center;
    }
    #loading-mask.active { display: flex; }
    .loading-spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── 冲线名次提示 ── */
    #finish-rank-toast {
      display: none;
      position: fixed; top: 15%; left: 50%; transform: translateX(-50%);
      z-index: 160; pointer-events: none;
      text-align: center;
    }
    #finish-rank-toast.active { display: block; }
    #finish-rank-text {
      font-size: 4rem; font-weight: 900;
      color: #ffdd44;
      text-shadow: 0 0 30px rgba(255,220,60,0.5), 0 3px 0 #aa8800;
      animation: toast-in 0.4s ease-out;
    }
    @keyframes toast-in {
      0% { transform: scale(2); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* ── 联机最终排名 ── */
    #online-result-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 150;
      flex-direction: column;
      justify-content: center; align-items: center;
      color: #fff;
      backdrop-filter: blur(4px);
    }
    #online-result-overlay.active { display: flex; }
    #online-result-overlay .result-title {
      font-size: 3rem; font-weight: 900;
      color: #ffdd44;
      text-shadow: 0 0 20px rgba(255,220,60,0.4);
      margin-bottom: 24px;
    }
    #online-result-list {
      width: 80%; max-width: 420px;
      margin-bottom: 28px;
    }
    .result-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 16px; margin-bottom: 6px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      font-size: 1.05rem;
    }
    .result-row.is-me {
      background: rgba(255,220,60,0.15);
      border-color: rgba(255,220,60,0.4);
    }
    .result-row .result-rank {
      font-weight: 900; font-size: 1.3rem; min-width: 40px; text-align: center;
    }
    .result-row .result-rank.gold { color: #ffdd44; }
    .result-row .result-rank.silver { color: #c0c0c0; }
    .result-row .result-rank.bronze { color: #cd7f32; }
    .result-row .result-name { flex: 1; margin-left: 12px; }
    .result-row .result-time { color: rgba(255,255,255,0.7); font-size: 0.95rem; }

    /* ── 倒计时覆盖层 ── */
    #countdown-overlay {
      display: none;
      position: fixed; inset: 0;
      z-index: 150;
      pointer-events: none;
      justify-content: center; align-items: center;
    }
    #countdown-overlay.active { display: flex; }
    #countdown-number {
      font-size: 10rem; font-weight: 900;
      color: #ffdd44;
      text-shadow: 0 0 40px rgba(255,220,60,0.6), 0 4px 0 #aa8800;
      animation: countdown-pulse 0.5s ease-in-out;
    }
    @keyframes countdown-pulse {
      0% { transform: scale(1.5); opacity: 0.5; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* ── 语言切换按钮 ── */
    #lang-toggle {
      position: fixed; top: 14px; right: 14px;
      z-index: 250;
      padding: 6px 16px;
      font-size: 0.9rem; font-weight: bold;
      color: #fff;
      background: rgba(0,0,0,0.45);
      border: 1.5px solid rgba(255,255,255,0.35);
      border-radius: 8px;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      letter-spacing: 0.05em;
    }
    #lang-toggle:hover {
      background: rgba(0,0,0,0.65);
      border-color: rgba(255,255,255,0.6);
      transform: scale(1.05);
    }
    #lang-toggle:active {
      transform: scale(0.97);
    }
  </style>
</head>
<body>

  <!-- 语言切换按钮 -->
  <button id="lang-toggle">EN</button>

  <!-- 主界面 -->
  <div id="main-menu">
    <div class="horse-emoji">🏇</div>
    <div class="game-title" data-i18n="gameTitle">摇摇赛马</div>
    <div class="game-intro" data-i18n="gameIntro">马匹会自己移动，滑动屏幕，利用脖子上的缰绳控制住马</div>
    <button class="menu-btn" id="btn-practice" data-i18n="btnPractice">驯服野马</button>
    <div class="menu-note" data-i18n="practiceNote">尝试捕获新的随机马匹</div>
    <div style="height:20px"></div>
    <button class="menu-btn race-btn" id="btn-race" data-i18n="btnRace">开始赛马</button>
    <div class="menu-note" id="race-note" data-i18n="raceNote">使用捕获的马匹参赛</div>
    <div style="height:20px"></div>
    <button class="menu-btn" id="btn-online" style="background:linear-gradient(135deg,#6633ff,#3366ff);box-shadow:0 4px 15px rgba(50,80,255,0.4)" data-i18n="btnOnline">联机赛马</button>
    <div class="menu-note" data-i18n="onlineNote">与其他玩家实时对战</div>
  </div>

  <!-- 网络请求遮罩 -->
  <div id="loading-mask">
    <div class="loading-spinner"></div>
  </div>

  <!-- 联机大厅 -->
  <div id="online-lobby">
    <div class="lobby-title" data-i18n="lobbyTitle">联机大厅</div>
    <div class="lobby-actions">
      <button class="lobby-btn btn-create-room" id="btn-create-room" data-i18n="btnCreateRoom">创建房间</button>
      <button class="lobby-btn btn-refresh-rooms" id="btn-refresh-rooms" data-i18n="btnRefresh">刷新</button>
      <button class="lobby-btn btn-back-lobby" id="btn-back-lobby" data-i18n="btnBackMenu">返回主界面</button>
    </div>
    <div id="room-list-container">
      <div class="room-empty" data-i18n="noRooms">暂无房间，点击上方创建一个</div>
    </div>
  </div>

  <!-- 房间等待 -->
  <div id="room-wait">
    <div class="wait-title" id="room-wait-title">房间</div>
    <div class="wait-phase" id="room-wait-phase" data-i18n="waitingPlayers">等待玩家加入...</div>
    <div id="player-list"></div>
    <div class="wait-actions">
      <button class="wait-btn btn-start-game" id="btn-start-game" style="display:none" data-i18n="btnStartGame">开始比赛</button>
      <button class="wait-btn btn-leave-room" id="btn-leave-room" data-i18n="btnLeaveRoom">离开房间</button>
    </div>
  </div>

  <!-- 游戏 -->
  <div id="info" data-i18n="loading">加载中...</div>
  <div id="rankings" style="display:none"></div>
  <div id="horse-stats"></div>
  <canvas id="canvas3d"></canvas>
  <canvas id="debug-canvas" width="300" height="180"></canvas>

  <div id="stamina-bar">
    <span data-i18n="stamina">耐力</span>
    <div id="stamina-bar-bg"><div id="stamina-bar-fill"></div></div>
  </div>

  <div id="swipe-indicator"><svg width="100%" height="100%"></svg></div>

  <!-- 联机倒计时 -->
  <div id="countdown-overlay">
    <div id="countdown-number"></div>
  </div>

  <!-- 冲线名次提示（短暂显示） -->
  <div id="finish-rank-toast">
    <div id="finish-rank-text"></div>
  </div>

  <!-- 联机最终排名 -->
  <div id="online-result-overlay">
    <div class="result-title" data-i18n="raceFinished">比赛结束</div>
    <div id="online-result-list"></div>
    <button class="finish-btn" id="btn-online-back">
      <span class="btn-icon">🏠</span>
      <span class="btn-label" data-i18n="backToMenu">返回主界面</span>
    </button>
  </div>

  <div id="finish-overlay">
    <div class="title" data-i18n="tameSuccess">驯服成功!</div>
    <!-- 驯服模式的按钮 -->
    <div class="finish-choices" id="tame-choices">
      <button class="finish-btn keep-btn" id="btn-keep">
        <span class="btn-icon">🐴</span>
        <span class="btn-label" data-i18n="keepHorse">保留此马</span>
        <span class="btn-desc" data-i18n="keepDesc">选择这匹马参赛</span>
      </button>
      <button class="finish-btn release-btn" id="btn-release">
        <span class="btn-icon">🌿</span>
        <span class="btn-label" data-i18n="releaseHorse">放生此马</span>
        <span class="btn-desc" data-i18n="releaseDesc">试试别的马</span>
      </button>
    </div>
    <!-- 赛马模式的按钮 -->
    <div class="finish-choices" id="race-choices" style="display:none">
      <button class="finish-btn" id="btn-back-menu">
        <span class="btn-icon">🏠</span>
        <span class="btn-label" data-i18n="backToMenu">返回主界面</span>
        <span class="btn-desc" data-i18n="backDesc">再来一局</span>
      </button>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
