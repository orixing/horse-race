<!DOCTYPE html>
<html lang="zh" id="html-root">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>摇摇赛马</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #222; font-family: sans-serif; touch-action: none; position: fixed; width: 100%; height: 100%; overscroll-behavior: none; }
    canvas { display: block; touch-action: none; }

    /* ── 主界面 ── */
    #main-menu {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #2a4a1a 0%, #3d6b24 40%, #2a4a1a 100%);
      z-index: 200;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      color: #fff;
    }
    #main-menu.hidden { display: none; }

    #main-menu .game-title {
      font-size: 1.2rem; font-weight: 900;
      color: #ffdd44;
      text-shadow: 0 0.04rem 0.2rem rgba(255,220,60,0.4), 0 0.02rem 0 #aa8800;
      letter-spacing: 0.1em;
      margin-bottom: 0.52rem;
    }
    #main-menu .game-intro {
      font-size: 0.36rem; color: rgba(255,255,255,0.8);
      max-width: 9rem; text-align: center;
      line-height: 1.8; margin-bottom: 1rem;
    }
    #main-menu .menu-btn {
      padding: 0.42rem 1.2rem;
      font-size: 0.42rem; font-weight: bold;
      color: #fff;
      background: linear-gradient(135deg, #ff6633, #ff3366);
      border: none; border-radius: 0.3rem;
      cursor: pointer;
      box-shadow: 0 0.1rem 0.4rem rgba(255,50,80,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    #main-menu .menu-btn:hover {
      transform: translateY(-0.04rem) scale(1.03);
      box-shadow: 0 0.16rem 0.6rem rgba(255,50,80,0.6);
    }
    #main-menu .menu-btn:active {
      transform: translateY(0) scale(0.98);
    }
    #main-menu .race-btn {
      background: linear-gradient(135deg, #33aa66, #2288aa);
      box-shadow: 0 0.1rem 0.4rem rgba(50,150,100,0.4);
    }
    #main-menu .race-btn:hover {
      box-shadow: 0 0.16rem 0.6rem rgba(50,150,100,0.6);
    }
    #main-menu .menu-note {
      margin-top: 0.52rem;
      font-size: 0.28rem; color: rgba(255,255,255,0.5);
      max-width: 8rem; text-align: center;
      line-height: 1.6;
    }
    #main-menu .horse-emoji {
      font-size: 0.9rem; margin-bottom: 0.26rem;
    }

    /* ── 游戏UI ── */
    #info {
      position: fixed; top: calc(0.26rem + env(safe-area-inset-top)); left: calc(0.26rem + env(safe-area-inset-left));
      color: #fff; font: 0.34rem monospace;
      background: rgba(0,0,0,0.5); padding: 0.2rem 0.3rem;
      border-radius: 0.16rem; pointer-events: none; z-index: 10;
    }

    #rankings {
      position: fixed; top: calc(1.1rem + env(safe-area-inset-top)); right: calc(0.26rem + env(safe-area-inset-right));
      color: #fff; font: 0.34rem monospace;
      background: rgba(0,0,0,0.6); padding: 0.26rem 0.36rem;
      border-radius: 0.16rem; pointer-events: none; z-index: 10;
      line-height: 1.6;
    }

    #stats-panel {
      position: fixed; top: calc(2rem + env(safe-area-inset-top)); right: env(safe-area-inset-right);
      z-index: 10;
      display: flex; align-items: flex-start;
      transform: translateX(calc(100% + 0.72rem));
      transition: transform 0.3s ease;
      pointer-events: none;
    }
    #stats-panel.visible { transform: translateX(5.6rem); pointer-events: auto; }
    #stats-panel.visible.open { transform: translateX(0); }
    #stats-toggle {
      flex-shrink: 0;
      width: 0.72rem; height: 1.2rem;
      background: rgba(0,0,0,0.6);
      color: #ccc; font-size: 0.36rem;
      border: 1px solid rgba(255,255,255,0.15);
      border-right: none;
      border-radius: 0.2rem 0 0 0.2rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(4px);
      transition: background 0.15s, color 0.15s;
      pointer-events: auto;
    }
    #stats-toggle:hover { background: rgba(0,0,0,0.8); color: #fff; }
    #stats-panel.open #stats-toggle { transform: scaleX(-1); }
    #horse-stats {
      color: #fff; font: 0.3rem sans-serif;
      background: rgba(0,0,0,0.7); padding: 0.3rem 0.36rem;
      border-radius: 0.2rem 0 0 0.2rem;
      max-height: 75vh; overflow-y: auto;
      width: 5.6rem;
      backdrop-filter: blur(4px);
    }
    #horse-stats .section { margin-bottom: 0.2rem; }
    #horse-stats .section-title {
      font-size: 0.26rem; color: #aaa; text-transform: uppercase;
      letter-spacing: 0.02rem; margin-bottom: 0.1rem;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 0.04rem;
    }
    #horse-stats .stat-row {
      display: flex; align-items: center; justify-content: space-between;
      margin: 0.06rem 0; font-size: 0.28rem;
    }
    #horse-stats .stat-label { color: #ccc; flex-shrink: 0; }
    #horse-stats .stat-value { color: #fff; font-weight: bold; text-align: right; }
    #horse-stats .bar-wrap {
      flex: 1; height: 0.16rem; background: rgba(255,255,255,0.1);
      border-radius: 0.08rem; margin: 0 0.16rem; overflow: hidden;
    }
    #horse-stats .bar-fill {
      height: 100%; border-radius: 0.08rem;
      transition: width 0.2s;
    }
    #horse-stats .tag {
      display: inline-block; padding: 0.02rem 0.16rem;
      border-radius: 0.08rem; font-size: 0.26rem; font-weight: bold;
    }
    #horse-stats .tag-on { background: #4a4; color: #fff; }
    #horse-stats .tag-off { background: #555; color: #888; }
    #horse-stats .tag-val { background: #446; color: #aaf; }
    #horse-stats .horse-name {
      font-size: 0.36rem; font-weight: bold; margin-bottom: 0.16rem;
    }
    #debug-canvas {
      position: fixed; bottom: calc(0.26rem + env(safe-area-inset-bottom)); left: calc(0.26rem + env(safe-area-inset-left));
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 0.1rem;
      background: rgba(0,0,0,0.7);
      z-index: 10;
    }

    #release-horse-bar {
      display: none;
      position: fixed; bottom: calc(1.6rem + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%);
      flex-direction: column; align-items: center; gap: 0.04rem;
      z-index: 10;
    }
    #release-horse-bar.active { display: flex; }
    #btn-release-inline {
      padding: 0.16rem 0.52rem;
      font: bold 0.34rem sans-serif; color: #fff;
      background: linear-gradient(135deg, #66aa66, #448844);
      border: none; border-radius: 0.2rem;
      cursor: pointer;
      pointer-events: auto;
      transition: transform 0.12s, filter 0.12s;
    }
    #btn-release-inline:hover { filter: brightness(1.15); transform: scale(1.04); }
    #btn-release-inline:active { transform: scale(0.96); }
    #release-desc {
      font-size: 0.26rem; color: rgba(255,255,255,0.5);
    }

    #stamina-bar {
      position: fixed; bottom: calc(0.78rem + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 0.2rem;
      color: #fff; font: bold 0.34rem sans-serif;
      pointer-events: none; z-index: 10;
    }
    #stamina-bar-bg {
      width: 7.6rem; height: 0.42rem;
      background: rgba(0,0,0,0.5); border-radius: 0.2rem; overflow: hidden;
    }
    #stamina-bar-fill {
      width: 0%; height: 100%;
      background: linear-gradient(90deg, #4466ff, #aa44ff, #ff44aa);
      border-radius: 0.2rem;
      transition: width 0.05s linear;
    }
    #swipe-indicator {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 5;
    }

    #finish-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      justify-content: center; align-items: center;
      flex-direction: column;
    }
    #finish-overlay.active { display: flex; }
    #finish-overlay .title {
      font-size: 1.6rem; font-weight: bold;
      color: #ffdd44;
      text-shadow: 0 0 0.52rem rgba(255,220,60,0.5);
      animation: pulse 0.6s ease-in-out infinite alternate;
    }
    #finish-overlay .rank {
      font-size: 0.6rem; color: #fff; margin-top: 0.26rem;
    }
    .finish-choices {
      display: flex; gap: 0.52rem; margin-top: 0.78rem;
    }
    .finish-btn {
      display: flex; flex-direction: column; align-items: center;
      padding: 0.52rem 0.78rem;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 0.36rem;
      background: rgba(0,0,0,0.4);
      color: #fff; cursor: pointer;
      transition: transform 0.15s, background 0.15s, border-color 0.15s;
      pointer-events: auto;
      backdrop-filter: blur(4px);
    }
    .finish-btn:hover {
      transform: translateY(-0.08rem) scale(1.03);
      border-color: rgba(255,255,255,0.6);
      background: rgba(0,0,0,0.6);
    }
    .finish-btn:active { transform: translateY(0) scale(0.97); }
    .finish-btn .btn-icon { font-size: 0.78rem; margin-bottom: 0.2rem; }
    .finish-btn .btn-label { font-size: 0.4rem; font-weight: bold; }
    .finish-btn .btn-desc { font-size: 0.28rem; color: #aaa; margin-top: 0.1rem; }
    .keep-btn:hover { border-color: #ffdd44; }
    .release-btn:hover { border-color: #66cc66; }
    @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.08); } }

    /* ── 联机大厅界面 ── */
    #online-lobby {
      display: none;
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #1a1a3a 0%, #2a2a5a 50%, #1a1a3a 100%);
      z-index: 200;
      flex-direction: column;
      align-items: center;
      padding-top: 1rem;
      color: #fff;
    }
    #online-lobby.active { display: flex; }
    #online-lobby .lobby-title {
      font-size: 0.7rem; font-weight: 900;
      color: #88aaff;
      text-shadow: 0 0.04rem 0.26rem rgba(100,150,255,0.3);
      margin-bottom: 0.62rem;
    }
    #online-lobby .lobby-actions {
      display: flex; gap: 0.3rem; margin-bottom: 0.52rem;
    }
    #online-lobby .lobby-btn {
      padding: 0.26rem 0.72rem;
      font-size: 0.34rem; font-weight: bold;
      color: #fff; border: none; border-radius: 0.26rem;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s;
    }
    #online-lobby .lobby-btn:hover { transform: translateY(-0.04rem); }
    #online-lobby .lobby-btn:active { transform: translateY(0) scale(0.97); }
    .lobby-name-row {
      display: flex; align-items: center; gap: 0.26rem;
      margin-bottom: 0.42rem;
    }
    .lobby-name-label {
      font-size: 0.34rem; color: rgba(255,255,255,0.7);
    }
    .lobby-name-input {
      padding: 0.2rem 0.36rem;
      font-size: 0.34rem;
      color: #fff;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 0.2rem;
      outline: none;
      width: 4.6rem;
    }
    .lobby-name-input:focus {
      border-color: rgba(100,150,255,0.6);
      background: rgba(255,255,255,0.15);
    }
    .btn-create-room {
      background: linear-gradient(135deg, #6633ff, #3366ff);
      box-shadow: 0 0.08rem 0.3rem rgba(50,80,255,0.4);
    }
    .btn-refresh-rooms {
      background: linear-gradient(135deg, #33aa66, #2288aa);
      box-shadow: 0 0.08rem 0.3rem rgba(50,150,100,0.4);
    }
    .btn-back-lobby {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3) !important;
    }
    #room-list-container {
      width: 90%; max-width: 9.6rem;
      flex: 1;
      overflow-y: auto;
    }
    #room-list-container .room-empty {
      text-align: center; color: rgba(255,255,255,0.4);
      font-size: 0.34rem; margin-top: 1rem;
    }
    .room-card {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.36rem 0.46rem;
      margin-bottom: 0.26rem;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 0.26rem;
      transition: background 0.15s, border-color 0.15s;
    }
    .room-card:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(100,150,255,0.4);
    }
    .room-card .room-info { display: flex; flex-direction: column; gap: 0.1rem; }
    .room-card .room-name { font-size: 0.36rem; font-weight: bold; }
    .room-card .room-players { font-size: 0.28rem; color: rgba(255,255,255,0.6); }
    .room-card .btn-join {
      padding: 0.2rem 0.52rem;
      font-size: 0.3rem; font-weight: bold;
      color: #fff;
      background: linear-gradient(135deg, #33aa66, #2288aa);
      border: none; border-radius: 0.2rem;
      cursor: pointer;
      transition: transform 0.12s;
    }
    .room-card .btn-join:hover { transform: scale(1.05); }

    /* ── 房间等待界面 ── */
    #room-wait {
      display: none;
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #1a2a1a 0%, #2a4a2a 50%, #1a2a1a 100%);
      z-index: 200;
      flex-direction: column;
      align-items: center;
      padding-top: 1rem;
      color: #fff;
    }
    #room-wait.active { display: flex; }
    #room-wait .wait-title {
      font-size: 0.62rem; font-weight: 900;
      color: #88ff88;
      text-shadow: 0 0.04rem 0.26rem rgba(100,255,100,0.3);
      margin-bottom: 0.2rem;
    }
    #room-wait .wait-phase {
      font-size: 0.34rem; color: rgba(255,255,255,0.5);
      margin-bottom: 0.52rem;
    }
    #player-list {
      width: 80%; max-width: 9rem;
      margin-bottom: 0.62rem;
    }
    .player-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.26rem 0.42rem;
      margin-bottom: 0.16rem;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 0.2rem;
    }
    .player-row .player-name { font-weight: bold; font-size: 0.34rem; }
    .player-row .player-tag {
      font-size: 0.26rem; padding: 0.04rem 0.2rem; border-radius: 0.1rem;
    }
    .player-row .tag-host { background: #ffdd44; color: #333; }
    .player-row .tag-ready { background: #44cc44; color: #fff; }
    .player-row .tag-not-ready { background: #666; color: #aaa; }
    .player-row .tag-you { background: rgba(100,150,255,0.3); color: #aaf; margin-left: 0.16rem; }
    #room-wait .wait-actions {
      display: flex; gap: 0.3rem;
    }
    #room-wait .wait-btn {
      padding: 0.3rem 0.94rem;
      font-size: 0.36rem; font-weight: bold;
      color: #fff; border: none; border-radius: 0.26rem;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s;
    }
    #room-wait .wait-btn:hover { transform: translateY(-0.04rem); }
    #room-wait .wait-btn:active { transform: translateY(0) scale(0.97); }
    .btn-ready {
      background: linear-gradient(135deg, #33aa66, #228855);
      box-shadow: 0 0.08rem 0.3rem rgba(50,170,100,0.4);
    }
    .btn-ready.is-ready {
      background: linear-gradient(135deg, #aa6633, #885522);
      box-shadow: 0 0.08rem 0.3rem rgba(170,100,50,0.4);
    }
    .btn-start-game {
      background: linear-gradient(135deg, #ff6633, #ff3366);
      box-shadow: 0 0.08rem 0.3rem rgba(255,50,80,0.4);
    }
    .btn-start-game:disabled {
      opacity: 0.4; cursor: not-allowed;
      transform: none !important;
    }
    .btn-leave-room {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3) !important;
    }

    /* ── 马厩界面 ── */
    #stable-screen {
      display: none;
      position: fixed; inset: 0;
      background:
        repeating-linear-gradient(90deg, rgba(80,50,20,0.15) 0px, transparent 2px, transparent 1.56rem),
        linear-gradient(180deg, #3a2210 0%, #5a3a1a 30%, #4a2e14 70%, #2a1a0a 100%);
      z-index: 200;
      flex-direction: column;
      align-items: center;
      padding-top: 0.78rem;
      color: #fff;
      overflow-y: auto;
    }
    #stable-screen.active { display: flex; }
    .stable-title {
      font-size: 0.72rem; font-weight: 900;
      color: #ffcc66;
      text-shadow: 0 0.04rem 0.3rem rgba(255,200,80,0.4), 0 0.02rem 0 #aa7722;
      letter-spacing: 0.05em;
      margin-bottom: 0.1rem;
    }
    .stable-subtitle {
      font-size: 0.28rem; color: rgba(255,220,150,0.5);
      margin-bottom: 0.52rem;
    }
    #stable-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.26rem;
      width: 92%; max-width: 9.6rem;
      margin-bottom: 0.62rem;
    }
    .stable-slot {
      aspect-ratio: 3/4;
      border-radius: 0.16rem;
      border: 0.06rem solid #6b4422;
      background:
        linear-gradient(180deg, #5a3a1a 0%, #3a2210 60%, #2a1808 100%);
      box-shadow: inset 0 0.04rem 0.2rem rgba(0,0,0,0.4), 0 0.04rem 0.1rem rgba(0,0,0,0.3);
      display: flex; flex-direction: column;
      justify-content: flex-end; align-items: center;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.12s;
      position: relative;
      padding: 0.16rem 0.1rem 0.2rem;
      overflow: hidden;
    }
    .stable-slot::before {
      content: "";
      position: absolute; top: 0; left: 0; right: 0;
      height: 0.16rem;
      background: linear-gradient(90deg, #8b6633, #aa8844, #8b6633);
      border-radius: 0.08rem 0.08rem 0 0;
    }
    .stable-slot:hover {
      border-color: #aa8844;
      box-shadow: inset 0 0.04rem 0.2rem rgba(0,0,0,0.4), 0 0 0.3rem rgba(255,200,80,0.2);
      transform: translateY(-0.04rem);
    }
    .stable-slot.is-active {
      border-color: #ffcc66;
      box-shadow: inset 0 0.04rem 0.2rem rgba(0,0,0,0.3), 0 0 0.52rem rgba(255,200,80,0.4);
    }
    .stable-slot.is-active::before {
      background: linear-gradient(90deg, #ffcc44, #ffdd88, #ffcc44);
    }
    .stable-slot.is-empty {
      cursor: default;
      opacity: 0.5;
    }
    .stable-slot.is-empty:hover {
      border-color: #6b4422;
      box-shadow: inset 0 0.04rem 0.2rem rgba(0,0,0,0.4), 0 0.04rem 0.1rem rgba(0,0,0,0.3);
      transform: none;
    }
    .slot-empty-icon {
      font-size: 0.56rem; color: rgba(255,220,150,0.15);
      margin-bottom: 0.2rem;
    }
    .slot-empty-text {
      font-size: 0.24rem; color: rgba(255,220,150,0.25);
    }
    .slot-canvas-wrap {
      width: 80%; aspect-ratio: 1/1;
      overflow: hidden;
      border-radius: 0.1rem;
      margin: 0.1rem auto 0.04rem;
    }
    .slot-horse-canvas {
      width: 100%; height: 100%;
      display: block;
    }
    .slot-horse-name {
      font-size: 0.26rem; font-weight: bold;
      text-align: center;
      color: #ffddaa;
      text-shadow: 0 0.02rem 0.04rem rgba(0,0,0,0.5);
      margin-top: 0.04rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }
    .slot-active-badge {
      position: absolute; top: 0.26rem; right: 0.1rem;
      font-size: 0.2rem; font-weight: bold;
      background: #ffcc66; color: #333;
      padding: 0.02rem 0.12rem; border-radius: 0.08rem;
      box-shadow: 0 0.02rem 0.08rem rgba(0,0,0,0.3);
    }
    .slot-index {
      position: absolute; top: 0.26rem; left: 0.12rem;
      font-size: 0.2rem; color: rgba(255,220,150,0.3);
    }
    .slot-manage-btn {
      margin-top: 0.1rem;
      padding: 0.08rem 0; width: 100%;
      font-size: 0.22rem; font-weight: bold;
      color: #ffddaa; background: rgba(255,200,80,0.15);
      border: 1px solid rgba(255,200,80,0.3);
      border-radius: 0.1rem; cursor: pointer;
      transition: background 0.12s;
    }
    .slot-manage-btn:hover { background: rgba(255,200,80,0.3); }
    .stable-actions {
      margin-bottom: 0.78rem;
    }
    .stable-actions .btn-stable-back {
      padding: 0.26rem 0.94rem;
      font-size: 0.34rem; font-weight: bold;
      color: #ffddaa;
      background: linear-gradient(135deg, #6b4422, #8b6633);
      border: 1.5px solid #aa8844;
      border-radius: 0.26rem;
      cursor: pointer;
      box-shadow: 0 0.04rem 0.2rem rgba(0,0,0,0.3);
      transition: transform 0.12s, filter 0.12s;
    }
    .stable-actions .btn-stable-back:hover {
      transform: translateY(-0.04rem);
      filter: brightness(1.15);
    }
    .stable-actions .btn-stable-back:active {
      transform: translateY(0);
    }

    /* ── 马匹详情面板 ── */
    #horse-detail-panel {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 210;
      justify-content: center; align-items: center;
      backdrop-filter: blur(4px);
    }
    #horse-detail-panel.active { display: flex; }
    .detail-card {
      width: 90%; max-width: 9rem;
      background: linear-gradient(180deg, #4a3018 0%, #3a2210 100%);
      border: 2px solid #8b6633;
      border-radius: 0.36rem;
      padding: 0.52rem;
      color: #fff;
      box-shadow: 0 0.2rem 0.78rem rgba(0,0,0,0.5);
      max-height: 85vh;
      overflow-y: auto;
    }
    .detail-preview-wrap {
      width: 60%; aspect-ratio: 3/2;
      margin: 0 auto 0.3rem;
      border-radius: 0.2rem;
      background: rgba(0,0,0,0.3);
      overflow: hidden;
    }
    .detail-preview {
      width: 100%; height: 100%;
      display: block;
    }
    .detail-name-input {
      display: block;
      width: 70%; margin: 0 auto 0.1rem;
      font-size: 0.42rem; font-weight: 900;
      color: #ffcc66;
      text-align: center;
      background: rgba(255,200,80,0.08);
      border: 1.5px solid rgba(255,200,80,0.25);
      border-radius: 0.16rem;
      padding: 0.1rem 0.2rem;
      outline: none;
    }
    .detail-name-input:focus {
      border-color: rgba(255,200,80,0.6);
      background: rgba(255,200,80,0.15);
    }
    .detail-slot-label {
      font-size: 0.26rem; color: rgba(255,220,150,0.5);
      text-align: center;
      margin-bottom: 0.36rem;
    }
    .detail-stats {
      margin-bottom: 0.42rem;
    }
    .detail-stat-row {
      display: flex; justify-content: space-between;
      padding: 0.16rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      font-size: 0.3rem;
    }
    .detail-stat-label { color: rgba(255,220,150,0.6); }
    .detail-stat-value { color: #ffddaa; font-weight: bold; }
    .detail-actions {
      display: flex; gap: 0.26rem; margin-top: 0.2rem;
    }
    .detail-btn {
      flex: 1; padding: 0.26rem 0;
      font-size: 0.32rem; font-weight: bold;
      border: none; border-radius: 0.2rem;
      cursor: pointer;
      transition: transform 0.12s, filter 0.12s;
    }
    .detail-btn:hover { transform: translateY(-0.02rem); filter: brightness(1.1); }
    .detail-btn:active { transform: translateY(0); }
    .detail-btn-active {
      background: linear-gradient(135deg, #ffcc44, #ffaa22);
      color: #333;
    }
    .detail-btn-release {
      background: rgba(255,80,80,0.2);
      color: #ff8888;
      border: 1px solid rgba(255,80,80,0.3);
    }
    .detail-btn-close {
      background: rgba(255,255,255,0.1);
      color: #ccc;
      border: 1px solid rgba(255,255,255,0.2);
    }

    /* ── 网络请求遮罩 ── */
    #loading-mask {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 300;
      justify-content: center; align-items: center;
    }
    #loading-mask.active { display: flex; }
    .loading-spinner {
      width: 1.2rem; height: 1.2rem;
      border: 0.1rem solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── 冲线名次提示 ── */
    #finish-rank-toast {
      display: none;
      position: fixed; top: 15%; left: 50%; transform: translateX(-50%);
      z-index: 160; pointer-events: none;
      text-align: center;
    }
    #finish-rank-toast.active { display: block; }
    #finish-rank-text {
      font-size: 1.2rem; font-weight: 900;
      color: #ffdd44;
      text-shadow: 0 0 0.78rem rgba(255,220,60,0.5), 0 0.08rem 0 #aa8800;
      animation: toast-in 0.4s ease-out;
    }
    @keyframes toast-in {
      0% { transform: scale(2); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* ── 联机最终排名 ── */
    #online-result-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 150;
      flex-direction: column;
      justify-content: center; align-items: center;
      color: #fff;
      backdrop-filter: blur(4px);
    }
    #online-result-overlay.active { display: flex; }
    #online-result-overlay .result-title {
      font-size: 0.9rem; font-weight: 900;
      color: #ffdd44;
      text-shadow: 0 0 0.52rem rgba(255,220,60,0.4);
      margin-bottom: 0.62rem;
    }
    #online-result-list {
      width: 80%; max-width: 9.6rem;
      margin-bottom: 0.72rem;
    }
    .result-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.26rem 0.42rem; margin-bottom: 0.16rem;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 0.2rem;
      font-size: 0.34rem;
    }
    .result-row.is-me {
      background: rgba(255,220,60,0.15);
      border-color: rgba(255,220,60,0.4);
    }
    .result-row .result-rank {
      font-weight: 900; font-size: 0.42rem; min-width: 1rem; text-align: center;
    }
    .result-row .result-rank.gold { color: #ffdd44; }
    .result-row .result-rank.silver { color: #c0c0c0; }
    .result-row .result-rank.bronze { color: #cd7f32; }
    .result-row .result-name { flex: 1; margin-left: 0.3rem; }
    .result-row .result-time { color: rgba(255,255,255,0.7); font-size: 0.3rem; }

    /* ── 倒计时覆盖层 ── */
    #countdown-overlay {
      display: none;
      position: fixed; inset: 0;
      z-index: 150;
      pointer-events: none;
      justify-content: center; align-items: center;
    }
    #countdown-overlay.active { display: flex; }
    #countdown-number {
      font-size: 3rem; font-weight: 900;
      color: #ffdd44;
      text-shadow: 0 0 1rem rgba(255,220,60,0.6), 0 0.1rem 0 #aa8800;
      animation: countdown-pulse 0.5s ease-in-out;
    }
    @keyframes countdown-pulse {
      0% { transform: scale(1.5); opacity: 0.5; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* ── 语言切换按钮 ── */
    #btn-back-home {
      display: none;
      position: fixed; top: calc(0.36rem + env(safe-area-inset-top)); right: calc(0.36rem + env(safe-area-inset-right));
      z-index: 250;
      padding: 0.16rem 0.42rem;
      font-size: 0.3rem; font-weight: bold;
      color: #fff;
      background: rgba(0,0,0,0.45);
      border: 1.5px solid rgba(255,255,255,0.35);
      border-radius: 0.2rem;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }
    #btn-back-home:hover {
      background: rgba(0,0,0,0.65);
      border-color: rgba(255,255,255,0.6);
      transform: scale(1.05);
    }
    #btn-back-home:active { transform: scale(0.97); }
    #lang-toggle {
      position: fixed; top: calc(1.1rem + env(safe-area-inset-top)); right: calc(0.36rem + env(safe-area-inset-right));
      z-index: 250;
      padding: 0.16rem 0.42rem;
      font-size: 0.3rem; font-weight: bold;
      color: #fff;
      background: rgba(0,0,0,0.45);
      border: 1.5px solid rgba(255,255,255,0.35);
      border-radius: 0.2rem;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      letter-spacing: 0.05em;
    }
    #lang-toggle:hover {
      background: rgba(0,0,0,0.65);
      border-color: rgba(255,255,255,0.6);
      transform: scale(1.05);
    }
    #lang-toggle:active {
      transform: scale(0.97);
    }
  </style>
</head>
<body>

  <!-- 语言切换按钮 -->
  <button id="lang-toggle">EN</button>

  <!-- 返回主界面按钮（游戏中显示） -->
  <button id="btn-back-home" data-i18n="btnBackHome">返回</button>

  <!-- 主界面 -->
  <div id="main-menu">
    <div class="horse-emoji">🏇</div>
    <div class="game-title" data-i18n="gameTitle">摇摇赛马</div>
    <div class="game-intro" data-i18n="gameIntro">马匹会自己移动，滑动屏幕，利用脖子上的缰绳控制住马</div>
    <button class="menu-btn" id="btn-practice" data-i18n="btnPractice">驯服野马</button>
    <div class="menu-note" data-i18n="practiceNote">尝试捕获新的随机马匹</div>
    <div style="height:0.52rem"></div>
    <button class="menu-btn" id="btn-stable" style="background:linear-gradient(135deg,#aa7733,#886622);box-shadow:0 0.1rem 0.4rem rgba(150,100,30,0.4)" data-i18n="btnStable">我的马厩</button>
    <div class="menu-note" data-i18n="stableNote">管理我捕获的马匹</div>
    <div style="height:0.52rem"></div>
    <button class="menu-btn race-btn" id="btn-race" data-i18n="btnRace">开始赛马</button>
    <div class="menu-note" id="race-note" data-i18n="raceNote">与人机一较高下</div>
    <div style="height:0.52rem"></div>
    <button class="menu-btn" id="btn-online" style="background:linear-gradient(135deg,#6633ff,#3366ff);box-shadow:0 0.1rem 0.4rem rgba(50,80,255,0.4)" data-i18n="btnOnline">联机赛马</button>
    <div class="menu-note" data-i18n="onlineNote">与其他玩家实时对战</div>
  </div>

  <!-- 马厩界面 -->
  <div id="stable-screen">
    <div class="stable-title" data-i18n="btnStable">我的马厩</div>
    <div class="stable-subtitle" data-i18n="stableSelectHint">点击马匹设为出战</div>
    <div id="stable-grid"></div>
    <div class="stable-actions">
      <button class="btn-stable-back" id="btn-stable-back" data-i18n="btnBackMenu">返回主界面</button>
    </div>
  </div>

  <!-- 马匹详情面板 -->
  <div id="horse-detail-panel">
    <div class="detail-card">
      <div class="detail-preview-wrap">
        <canvas class="detail-preview" id="detail-preview-canvas"></canvas>
      </div>
      <input type="text" class="detail-name-input" id="detail-horse-name" maxlength="12">
      <div class="detail-slot-label" id="detail-slot-label"></div>
      <div class="detail-stats" id="detail-stats"></div>
      <div class="detail-actions">
        <button class="detail-btn detail-btn-active" id="detail-btn-active"></button>
        <button class="detail-btn detail-btn-release" id="detail-btn-release"></button>
      </div>
      <div class="detail-actions" style="margin-top:0.16rem">
        <button class="detail-btn detail-btn-close" id="detail-btn-close"></button>
      </div>
    </div>
  </div>

  <!-- 网络请求遮罩 -->
  <div id="loading-mask">
    <div class="loading-spinner"></div>
  </div>

  <!-- 联机大厅 -->
  <div id="online-lobby">
    <div class="lobby-title" data-i18n="lobbyTitle">联机大厅</div>
    <div class="lobby-name-row">
      <label for="player-name-input" class="lobby-name-label" data-i18n="playerName">昵称</label>
      <input type="text" id="player-name-input" class="lobby-name-input" maxlength="12">
    </div>
    <div class="lobby-actions">
      <button class="lobby-btn btn-create-room" id="btn-create-room" data-i18n="btnCreateRoom">创建房间</button>
      <button class="lobby-btn btn-refresh-rooms" id="btn-refresh-rooms" data-i18n="btnRefresh">刷新</button>
      <button class="lobby-btn btn-back-lobby" id="btn-back-lobby" data-i18n="btnBackMenu">返回主界面</button>
    </div>
    <div id="room-list-container">
      <div class="room-empty" data-i18n="noRooms">暂无房间，点击上方创建一个</div>
    </div>
  </div>

  <!-- 房间等待 -->
  <div id="room-wait">
    <div class="wait-title" id="room-wait-title">房间</div>
    <div class="wait-phase" id="room-wait-phase" data-i18n="waitingPlayers">等待玩家加入...</div>
    <div id="player-list"></div>
    <div class="wait-actions">
      <button class="wait-btn btn-start-game" id="btn-start-game" style="display:none" data-i18n="btnStartGame">开始比赛</button>
      <button class="wait-btn btn-leave-room" id="btn-leave-room" data-i18n="btnLeaveRoom">离开房间</button>
    </div>
  </div>

  <!-- 游戏 -->
  <div id="info" data-i18n="loading">加载中...</div>
  <div id="rankings" style="display:none"></div>
  <div id="stats-panel">
    <button id="stats-toggle" onclick="this.parentElement.classList.toggle('open')">&#9664;</button>
    <div id="horse-stats"></div>
  </div>
  <canvas id="canvas3d"></canvas>
  <canvas id="debug-canvas" width="300" height="180"></canvas>

  <div id="release-horse-bar">
    <button id="btn-release-inline" onclick="window._releaseHorse()">🌿 <span data-i18n="sideRelease">放生此马</span></button>
    <span id="release-desc" data-i18n="sideReleaseDesc">试试别的马</span>
  </div>

  <div id="stamina-bar">
    <span data-i18n="stamina">耐力</span>
    <div id="stamina-bar-bg"><div id="stamina-bar-fill"></div></div>
  </div>

  <div id="swipe-indicator"><svg width="100%" height="100%"></svg></div>

  <!-- 联机倒计时 -->
  <div id="countdown-overlay">
    <div id="countdown-number"></div>
  </div>

  <!-- 冲线名次提示（短暂显示） -->
  <div id="finish-rank-toast">
    <div id="finish-rank-text"></div>
  </div>

  <!-- 联机最终排名 -->
  <div id="online-result-overlay">
    <div class="result-title" data-i18n="raceFinished">比赛结束</div>
    <div id="online-result-list"></div>
    <button class="finish-btn" id="btn-online-back">
      <span class="btn-icon">🏠</span>
      <span class="btn-label" data-i18n="backToMenu">返回主界面</span>
    </button>
  </div>

  <div id="finish-overlay">
    <div class="title" data-i18n="tameSuccess">驯服成功!</div>
    <!-- 驯服模式的按钮 -->
    <div class="finish-choices" id="tame-choices">
      <button class="finish-btn keep-btn" id="btn-keep">
        <span class="btn-icon">🐴</span>
        <span class="btn-label" data-i18n="keepHorse">保留此马</span>
        <span class="btn-desc" data-i18n="keepDesc">选择这匹马参赛</span>
      </button>
      <button class="finish-btn release-btn" id="btn-release">
        <span class="btn-icon">🌿</span>
        <span class="btn-label" data-i18n="releaseHorse">放生此马</span>
        <span class="btn-desc" data-i18n="releaseDesc">试试别的马</span>
      </button>
    </div>
    <!-- 赛马模式的按钮 -->
    <div class="finish-choices" id="race-choices" style="display:none">
      <button class="finish-btn" id="btn-back-menu">
        <span class="btn-icon">🏠</span>
        <span class="btn-label" data-i18n="backToMenu">返回主界面</span>
        <span class="btn-desc" data-i18n="backDesc">再来一局</span>
      </button>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
