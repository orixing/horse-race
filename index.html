<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>滑动赛马</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #222; font-family: sans-serif; }
    canvas { display: block; }

    /* ── 主界面 ── */
    #main-menu {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #2a4a1a 0%, #3d6b24 40%, #2a4a1a 100%);
      z-index: 200;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      color: #fff;
    }
    #main-menu.hidden { display: none; }

    #main-menu .game-title {
      font-size: 4rem; font-weight: 900;
      color: #ffdd44;
      text-shadow: 0 4px 20px rgba(255,220,60,0.4), 0 2px 0 #aa8800;
      letter-spacing: 0.1em;
      margin-bottom: 20px;
    }
    #main-menu .game-intro {
      font-size: 1.1rem; color: rgba(255,255,255,0.8);
      max-width: 400px; text-align: center;
      line-height: 1.8; margin-bottom: 40px;
    }
    #main-menu .menu-btn {
      padding: 16px 48px;
      font-size: 1.3rem; font-weight: bold;
      color: #fff;
      background: linear-gradient(135deg, #ff6633, #ff3366);
      border: none; border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(255,50,80,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    #main-menu .menu-btn:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 6px 25px rgba(255,50,80,0.6);
    }
    #main-menu .menu-btn:active {
      transform: translateY(0) scale(0.98);
    }
    #main-menu .menu-note {
      margin-top: 20px;
      font-size: 0.85rem; color: rgba(255,255,255,0.5);
      max-width: 350px; text-align: center;
      line-height: 1.6;
    }
    #main-menu .horse-emoji {
      font-size: 3rem; margin-bottom: 10px;
    }

    /* ── 游戏UI ── */
    #info {
      position: fixed; top: 10px; left: 10px;
      color: #fff; font: 14px monospace;
      background: rgba(0,0,0,0.5); padding: 8px 12px;
      border-radius: 6px; pointer-events: none; z-index: 10;
    }

    #rankings {
      position: fixed; top: 10px; right: 10px;
      color: #fff; font: 14px monospace;
      background: rgba(0,0,0,0.6); padding: 10px 14px;
      border-radius: 6px; pointer-events: none; z-index: 10;
      line-height: 1.6;
    }

    #debug-canvas {
      position: fixed; bottom: 10px; left: 10px;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 4px;
      background: rgba(0,0,0,0.7);
      z-index: 10;
    }

    #stamina-bar {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 8px;
      color: #fff; font: bold 13px sans-serif;
      pointer-events: none; z-index: 10;
    }
    #stamina-bar-bg {
      width: 300px; height: 16px;
      background: rgba(0,0,0,0.5); border-radius: 8px; overflow: hidden;
    }
    #stamina-bar-fill {
      width: 0%; height: 100%;
      background: linear-gradient(90deg, #4466ff, #aa44ff, #ff44aa);
      border-radius: 8px;
      transition: width 0.05s linear;
    }
    #swipe-indicator {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 5;
    }

    #finish-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      justify-content: center; align-items: center;
      flex-direction: column;
    }
    #finish-overlay.active { display: flex; }
    #finish-overlay .title {
      font-size: 5rem; font-weight: bold;
      color: #ffdd44;
      text-shadow: 0 0 20px rgba(255,220,60,0.5);
      animation: pulse 0.6s ease-in-out infinite alternate;
    }
    #finish-overlay .rank {
      font-size: 2rem; color: #fff; margin-top: 10px;
    }
    #finish-overlay .hint {
      font-size: 1rem; color: #aaa; margin-top: 20px;
    }
    @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.08); } }
  </style>
</head>
<body>

  <!-- 主界面 -->
  <div id="main-menu">
    <div class="horse-emoji">🏇</div>
    <div class="game-title">滑动赛马</div>
    <div class="game-intro">马匹会自己移动，滑动控制驾驭马匹前进。</div>
    <button class="menu-btn" id="btn-practice">练习模式</button>
    <div class="menu-note">使用随机马匹，有专业的数据分析，<br>学习更好的驾驭马匹。</div>
  </div>

  <!-- 游戏 -->
  <div id="info">加载中...</div>
  <div id="rankings"></div>
  <canvas id="canvas3d"></canvas>
  <canvas id="debug-canvas" width="800" height="420"></canvas>

  <div id="stamina-bar">
    <span>耐力</span>
    <div id="stamina-bar-bg"><div id="stamina-bar-fill"></div></div>
  </div>

  <div id="swipe-indicator"><svg width="100%" height="100%"></svg></div>

  <div id="finish-overlay">
    <div class="title">完赛!</div>
    <div class="rank">第 1 名</div>
    <div class="hint">自动重新开始...</div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
